<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抽 Issue — cp26-quiz</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #e8f5e9 0%, #f0f4ff 100%);
        padding: 1rem;
      }

      .card {
        background: white;
        border-radius: 1rem;
        padding: 2.5rem 2rem;
        max-width: 480px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 0.5rem;
      }

      .repo {
        font-size: 0.875rem;
        color: #6b7280;
        margin-bottom: 2rem;
      }

      button {
        cursor: pointer;
        padding: 0.75rem 2rem;
        border: none;
        border-radius: 0.5rem;
        font-size: 1.125rem;
        font-weight: 600;
        background: #2e7d32;
        color: white;
        transition:
          background 0.15s,
          transform 0.1s;
        min-width: 160px;
      }

      button:hover:not(:disabled) {
        background: #1b5e20;
      }
      button:active:not(:disabled) {
        transform: scale(0.97);
      }
      button:disabled {
        background: #9e9e9e;
        cursor: not-allowed;
      }

      #status {
        margin-top: 1.5rem;
        min-height: 2.5rem;
        font-size: 0.95rem;
        color: #374151;
        line-height: 1.5;
      }

      #status.error {
        color: #dc2626;
      }

      .issue-preview {
        margin-top: 1.25rem;
        padding: 1rem;
        background: #f9fafb;
        border-radius: 0.5rem;
        border: 1px solid #e5e7eb;
        text-align: left;
      }

      .issue-preview .number {
        font-size: 0.8rem;
        color: #6b7280;
        margin-bottom: 0.25rem;
      }

      .issue-preview .title {
        font-size: 1rem;
        font-weight: 600;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎲 抽 Issue</h1>
      <p class="repo">mirumodapon/cp26-quiz</p>
      <button id="btn" onclick="pickIssue()">隨機抽一個</button>
      <div id="status"></div>
    </div>

    <script>
      const REPO = 'mirumodapon/cp26-quiz'
      const API = `https://api.github.com/repos/${REPO}/issues`

      async function fetchAllIssues() {
        const issues = []
        let page = 1
        while (true) {
          const res = await fetch(`${API}?state=open&per_page=100&page=${page}`)
          if (!res.ok) throw new Error(`GitHub API 回傳 ${res.status}`)
          const data = await res.json()
          if (data.length === 0) break
          // filter out pull requests
          issues.push(...data.filter((i) => !i.pull_request))
          if (data.length < 100) break
          page++
        }
        return issues
      }

      async function pickIssue() {
        const btn = document.getElementById('btn')
        const status = document.getElementById('status')

        btn.disabled = true
        status.className = ''
        status.innerHTML = '載入中…'

        try {
          const issues = await fetchAllIssues()

          if (issues.length === 0) {
            status.className = 'error'
            status.textContent = '目前沒有開放的 issue。'
            return
          }

          const picked = issues[Math.floor(Math.random() * issues.length)]
          status.innerHTML = `
          <div class="issue-preview">
            <div class="number">#${picked.number} · ${issues.length} 個 issue 中隨機抽出</div>
            <div class="title">${escapeHtml(picked.title)}</div>
          </div>
          <p style="margin-top:1rem;color:#6b7280;font-size:0.85rem">即將跳轉…</p>
        `
          setTimeout(() => {
            window.location.href = picked.html_url
          }, 1200)
        } catch (err) {
          status.className = 'error'
          status.textContent = `錯誤：${err.message}`
          btn.disabled = false
        }
      }

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
      }
    </script>
  </body>
</html>
